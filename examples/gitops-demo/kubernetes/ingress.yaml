apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: demo-web
  namespace: gitops-demo
  labels: { app: demo-web }
spec:
  ingressClassName: nginx
  rules:
    - host: gitops-demo.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: demo-web
                port:
                  number: 80
