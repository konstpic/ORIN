# ORIN Application catalog — read by the controller when APPS_CATALOG_* env vars
# point at this repository and path (default path: orin/apps.yaml).
# Every spec.source.repoURL must already be registered under Repositories.
# Rows removed from this file are NOT deleted from the DB (safety).
#
# This file declares the BOOTSTRAP (parent) application.
# The parent chart (examples/gitops-demo/deploy/.helm) renders orin.dev/v1alpha1 Application and
# AppProject objects for each child in values.devApps.  The controller
# materialises them automatically on every reconcile — no flag needed.
apiVersion: orin.dev/v1alpha1
kind: Application
metadata:
  name: gitops-demo-stack
spec:
  project: default
  source:
    repoURL: https://github.com/konstpic/ORIN.git
    path: examples/gitops-demo/deploy/.helm
    targetRevision: main
  destination:
    name: in-cluster
    namespace: gitops-demo-stack
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    createNamespace: true
