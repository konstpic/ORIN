apiVersion: v1
kind: Service
metadata:
  name: orin
  namespace: orin
spec:
  type: LoadBalancer
  selector: { app: orin }
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orin
  namespace: orin
spec:
  replicas: 1
  selector:
    matchLabels: { app: orin }
  template:
    metadata:
      labels: { app: orin }
    spec:
      serviceAccountName: orin
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - >-
              until pg_isready -h orin-postgres.orin.svc.cluster.local -p 5432 -U k8sui;
              do sleep 1; done
      containers:
        - name: orin
          image: orin:dev
          imagePullPolicy: IfNotPresent
          ports:
            - { containerPort: 8080, name: http }
          envFrom:
            - secretRef: { name: orin }
          readinessProbe:
            httpGet: { path: /readyz, port: 8080 }
            initialDelaySeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 10
          volumeMounts:
            - { name: repo-cache, mountPath: /tmp/orin-repos }
      volumes:
        - name: repo-cache
          emptyDir: {}
