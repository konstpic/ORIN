# Minimal single-replica Postgres for the MVP. For production use a managed
# DB (RDS, Cloud SQL, Crunchy Data Operator) and delete this file.
apiVersion: v1
kind: Service
metadata:
  name: orin-postgres
  namespace: orin
spec:
  selector:
    app: orin-postgres
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: orin-postgres
  namespace: orin
spec:
  serviceName: orin-postgres
  replicas: 1
  selector:
    matchLabels: { app: orin-postgres }
  template:
    metadata:
      labels: { app: orin-postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - { name: POSTGRES_USER, value: k8sui }
            - { name: POSTGRES_PASSWORD, value: k8sui }
            - { name: POSTGRES_DB, value: k8sui }
          ports:
            - containerPort: 5432
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: [ReadWriteOnce]
        resources: { requests: { storage: 1Gi } }
