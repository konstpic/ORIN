apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-ui
  namespace: k8s-ui
---
# MVP: cluster-admin. Tighten in production (RBAC todo).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-ui-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: k8s-ui
    namespace: k8s-ui
