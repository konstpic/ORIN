apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "orin.fullname" . }}
  labels: {{- include "orin.labels" . | nindent 4 }}
{{- if .Values.rbac.clusterAdmin }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ printf "%s-%s" (include "orin.fullname" .) .Release.Namespace | trunc 63 | trimSuffix "-" }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: {{ include "orin.fullname" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
