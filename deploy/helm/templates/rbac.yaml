apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "k8s-ui.fullname" . }}
  labels: {{- include "k8s-ui.labels" . | nindent 4 }}
{{- if .Values.rbac.clusterAdmin }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "k8s-ui.fullname" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: {{ include "k8s-ui.fullname" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
