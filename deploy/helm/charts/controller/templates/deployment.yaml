apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "controller.fullname" . }}
  labels: {{- include "controller.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "controller.fullname" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "controller.fullname" . }}
    spec:
      serviceAccountName: {{ include "controller.serviceAccountName" . }}
      {{- with .Values.global.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.global.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: controller
          image: {{ include "controller.image" . | quote }}
          imagePullPolicy: {{ include "controller.imagePullPolicy" . }}
          envFrom:
            - secretRef: { name: {{ include "controller.secretName" . }} }
          env:
            - { name: IN_CLUSTER, value: "true" }
            - { name: REPO_SERVER_ADDR, value: {{ include "controller.reposerverAddr" . | quote }} }
            - { name: REPO_CACHE_DIR, value: /tmp/orin-repos }
            {{- if and .Values.appsCatalog.enabled .Values.appsCatalog.repoUrl }}
            - { name: APPS_CATALOG_REPO_URL, value: {{ .Values.appsCatalog.repoUrl | quote }} }
            - { name: APPS_CATALOG_PATH, value: {{ .Values.appsCatalog.path | default "orin/apps.yaml" | quote }} }
            - { name: APPS_CATALOG_REVISION, value: {{ .Values.appsCatalog.revision | default "HEAD" | quote }} }
            - { name: APPS_CATALOG_INTERVAL, value: {{ .Values.appsCatalog.interval | default "5m" | quote }} }
            {{- end }}
          livenessProbe:
            exec: { command: ["true"] }
            initialDelaySeconds: 30
            periodSeconds: 30
          resources: {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - { name: repo-cache, mountPath: /tmp/orin-repos }
      volumes:
        - name: repo-cache
          emptyDir: {}
