apiVersion: v1
kind: Secret
metadata:
  name: {{ include "common.secretName" . }}
  labels: {{- include "common.labels" . | nindent 4 }}
type: Opaque
stringData:
  ADMIN_TOKEN: {{ .Values.global.adminToken | quote }}
  ENCRYPTION_KEY: {{ .Values.global.encryptionKey | quote }}
  {{- $dbURL := .Values.global.databaseUrl -}}
  {{- if not $dbURL }}
  {{- $pg := .Values.global.postgres -}}
  {{- if $pg.enabled }}
  {{- $host := printf "%s-postgres" .Release.Name -}}
  {{- $dbURL = printf "postgres://%s:%s@%s:5432/%s?sslmode=disable" $pg.username $pg.password $host $pg.database -}}
  {{- else }}
  {{- $dbURL = required "global.databaseUrl is required when global.postgres.enabled=false" .Values.global.databaseUrl -}}
  {{- end }}
  {{- end }}
  DATABASE_URL: {{ $dbURL | quote }}
