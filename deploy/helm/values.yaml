image:
  # Build on the machine that runs the cluster: `make docker` → k8s-ui:<VERSION> (default dev).
  repository: k8s-ui
  tag: dev
  pullPolicy: IfNotPresent

# Single-replica MVP. Scale once leader election lands.
replicaCount: 1

service:
  type: LoadBalancer
  port: 8080
  # When type is NodePort, set a fixed port (30000–32767) for local clusters.
  nodePort: null

# Static admin token. Override via --set or values.yaml.
adminToken: change-me

# 32-byte hex.
encryptionKey: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"

# Postgres connection string.
databaseUrl: postgres://k8sui:k8sui@k8s-ui-postgres:5432/k8sui?sslmode=disable

postgres:
  enabled: true
  storage: 1Gi

rbac:
  clusterAdmin: true # MVP

resources: {}

# Optional: pin pods to a node (useful on Docker Desktop multi-node when the
# app image is built on the host and only the control-plane node sees the new tag).
nodeSelector: {}
tolerations: []

# Optional Git-driven Application catalog (creates Application rows from a YAML file in Git).
# repoUrl must match a Repository URL registered in k8s-ui exactly (same string as in the UI).
appsCatalog:
  enabled: false
  repoUrl: ""
  path: k8s-ui/apps.yaml
  revision: HEAD
  interval: 5m
