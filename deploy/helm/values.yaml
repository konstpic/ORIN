# Umbrella chart for scaled ORIN (subcharts under charts/).
# Images: Docker Hub https://hub.docker.com/u/konstpic

global:
  image:
    tag: "0.2.5"
    pullPolicy: IfNotPresent

  images:
    apiserver:
      repository: konstpic/orin-apiserver
    controller:
      repository: konstpic/orin-controller
    reposerver:
      repository: konstpic/orin-reposerver

  adminToken: devtoken
  encryptionKey: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
  databaseUrl: ""

  postgres:
    enabled: true
    username: orin
    password: orin
    database: orin

  serviceAccount:
    name: ""

  rbac:
    clusterAdmin: true

  nodeSelector: {}
  tolerations: []

postgres:
  storage: 1Gi

apiserver:
  replicaCount: 2
  service:
    type: LoadBalancer
    port: 80
    nodePort: null
  resources: {}

controller:
  replicaCount: 2
  resources: {}
  appsCatalog:
    enabled: false
    repoUrl: ""
    path: orin/apps.yaml
    revision: HEAD
    interval: 5m

reposerver:
  replicaCount: 2
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilization: 70
