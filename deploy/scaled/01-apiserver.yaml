# Scaled deployment: 3 independent components
#   apiserver   — stateless, scale with HPA (2+ replicas)
#   controller  — leader election, 1 active at a time (2+ replicas for HA)
#   reposerver  — gRPC renderer, scale with HPA based on CPU (2+ replicas)

apiVersion: apps/v1
kind: Deployment
metadata:
  name: orin-apiserver
  namespace: orin
  labels:
    app.kubernetes.io/name: orin-apiserver
    app.kubernetes.io/component: apiserver
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: orin-apiserver
  template:
    metadata:
      labels:
        app.kubernetes.io/name: orin-apiserver
    spec:
      serviceAccountName: orin
      containers:
      - name: apiserver
        image: orin:dev
        args: ["apiserver"]
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: orin-secret
              key: database-url
        - name: ADMIN_TOKEN
          valueFrom:
            secretKeyRef:
              name: orin-secret
              key: admin-token
        - name: ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: orin-secret
              key: encryption-key
        - name: IN_CLUSTER
          value: "true"
        - name: WEB_ASSETS_DIR
          value: /app/web
        - name: REPO_SERVER_ADDR
          value: "orin-reposerver:50051"
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: orin-apiserver
  namespace: orin
spec:
  selector:
    app.kubernetes.io/name: orin-apiserver
  ports:
  - port: 8080
    targetPort: 8080
    name: http
  type: LoadBalancer
