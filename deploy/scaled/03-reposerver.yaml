# RepoServer: gRPC manifest renderer.
# Scales horizontally — each instance has its own git cache.
# Use HPA based on CPU to handle render load spikes.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-ui-reposerver
  namespace: k8s-ui
  labels:
    app.kubernetes.io/name: k8s-ui-reposerver
    app.kubernetes.io/component: reposerver
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: k8s-ui-reposerver
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k8s-ui-reposerver
    spec:
      serviceAccountName: k8s-ui
      containers:
      - name: reposerver
        image: k8s-ui:dev
        args: ["reposerver"]
        ports:
        - containerPort: 50051
          name: grpc
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: k8s-ui-secret
              key: database-url
        - name: ADMIN_TOKEN
          valueFrom:
            secretKeyRef:
              name: k8s-ui-secret
              key: admin-token
        - name: ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: k8s-ui-secret
              key: encryption-key
        - name: REPO_SERVER_ADDR
          value: ":50051"
        - name: REPO_CACHE_DIR
          value: /tmp/k8s-ui-repos
        livenessProbe:
          exec:
            command: ["true"]
          initialDelaySeconds: 10
          periodSeconds: 30
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: "2"
            memory: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: k8s-ui-reposerver
  namespace: k8s-ui
spec:
  selector:
    app.kubernetes.io/name: k8s-ui-reposerver
  ports:
  - port: 50051
    targetPort: 50051
    name: grpc
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: k8s-ui-reposerver
  namespace: k8s-ui
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: k8s-ui-reposerver
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
