# Controller deployment with leader election via PostgreSQL advisory lock.
# Multiple replicas can run — only one actively reconciles at a time.
# If the leader crashes, the lock is released and a standby takes over.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: orin-controller
  namespace: orin
  labels:
    app.kubernetes.io/name: orin-controller
    app.kubernetes.io/component: controller
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: orin-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: orin-controller
    spec:
      serviceAccountName: orin
      containers:
      - name: controller
        image: orin:dev
        args: ["controller"]
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: orin-secret
              key: database-url
        - name: ADMIN_TOKEN
          valueFrom:
            secretKeyRef:
              name: orin-secret
              key: admin-token
        - name: ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: orin-secret
              key: encryption-key
        - name: IN_CLUSTER
          value: "true"
        - name: REPO_SERVER_ADDR
          value: "orin-reposerver:50051"
        - name: REPO_CACHE_DIR
          value: /tmp/orin-repos
        livenessProbe:
          exec:
            command: ["true"]
          initialDelaySeconds: 30
          periodSeconds: 30
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 1Gi
