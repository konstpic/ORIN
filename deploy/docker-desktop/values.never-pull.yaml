# Optional: use with USE_LOCAL_IMAGE_NEVER=1 in deploy.sh — image must exist
# on the node (same containerd store as docker build). Most Docker Desktop
# setups do NOT satisfy this without extra configuration.
global:
  image:
    repository: orin
    tag: local
    pullPolicy: Never
  images:
    apiserver:
      repository: orin-apiserver
    controller:
      repository: orin-controller
    reposerver:
      repository: orin-reposerver
