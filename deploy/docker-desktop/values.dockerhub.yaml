# Docker Hub images (USE_DOCKERHUB=1 in deploy.sh).
# Override user: DOCKERHUB_USER=myuser DOCKERHUB_TAG=0.2.2 ./deploy.sh

global:
  image:
    tag: "0.2.2"
    pullPolicy: IfNotPresent
  images:
    apiserver:
      repository: konstpic/orin-apiserver
    controller:
      repository: konstpic/orin-controller
    reposerver:
      repository: konstpic/orin-reposerver
