# Docker Desktop — base Helm values (scaled components + Postgres).
# Image reference is set by deploy.sh:
#   - default: push to ttl.sh then pull with imagePullPolicy: Always
#   - USE_LOCAL_IMAGE_NEVER=1: merge values.never-pull.yaml (orin:local + Never)

apiserver:
  service:
    type: LoadBalancer
    port: 80

global:
  adminToken: devtoken
  encryptionKey: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
  databaseUrl: ""

  postgres:
    enabled: true
    username: orin
    password: orin
    database: orin

  rbac:
    clusterAdmin: true

  nodeSelector:
    kubernetes.io/hostname: desktop-control-plane
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
