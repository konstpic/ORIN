run:
  timeout: 5m
  go: "1.23"
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - gofmt
    - goimports
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - typecheck
    - unconvert
    - unused

linters-settings:
  goimports:
    local-prefixes: github.com/k8s-ui/k8s-ui
  revive:
    rules:
      - name: var-naming
      - name: package-comments
      - name: exported
        arguments: [disableStutteringCheck]

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - revive
  max-issues-per-linter: 0
  max-same-issues: 0
